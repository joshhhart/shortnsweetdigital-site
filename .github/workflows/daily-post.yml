name: Daily SEO post

on:
  schedule:
    # 13:00 UTC = 08:00 America/New_York during EST,
    # 09:00 during EDT. Pick one and live with the DST shift,
    # or add a second cron for the other half of the year.
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Override target keyword (optional)'
        required: false

permissions:
  contents: write

concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # The Agent SDK shells out to the `claude` CLI, so it must be on PATH.
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      # Install only the skills the daily pipeline actually uses. Loading all
      # 24 claude-seo sub-skills + claude-blog put us over the 30k input
      # tokens/min rate limit on startup. Trim aggressively.
      - name: Install Claude skill packs (trimmed)
        run: |
          set -euo pipefail
          mkdir -p ~/.claude/skills ~/.claude/agents
          tmp=$(mktemp -d)
          git clone --depth=1 https://github.com/AgriciDaniel/claude-seo  "$tmp/claude-seo"
          git clone --depth=1 https://github.com/AgriciDaniel/claude-blog "$tmp/claude-blog"
          # claude-seo: only the skills the daily pipeline references.
          for skill in seo seo-audit seo-content seo-page; do
            [[ -d "$tmp/claude-seo/skills/$skill" ]] && cp -R "$tmp/claude-seo/skills/$skill" ~/.claude/skills/ || true
          done
          # claude-blog: take everything (assumed small).
          [[ -d "$tmp/claude-blog/skills" ]] && cp -R "$tmp/claude-blog/skills/." ~/.claude/skills/ || true
          ls ~/.claude/skills

      - name: Generate post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_VOICE_ID: ${{ secrets.XAI_VOICE_ID }}
          KEYWORD_OVERRIDE: ${{ inputs.keyword }}
        run: node scripts/daily-seo-job.mjs

      - name: Smoke build
        run: npm run build

      - name: Commit & push
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes — pipeline produced nothing. Failing so it's visible."
            exit 1
          fi
          git config user.name  "agentic-jimmy[bot]"
          git config user.email "agentic-jimmy[bot]@users.noreply.github.com"
          git add src/content/blog public/audio public/images
          SLUG=$(git diff --cached --name-only -- src/content/blog | head -1 | xargs -I{} basename {} .md)
          git commit -m "Publish: ${SLUG}"
          git push origin HEAD:main
