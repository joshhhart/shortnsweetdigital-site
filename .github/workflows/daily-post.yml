name: Daily SEO post

on:
  schedule:
    # 13:00 UTC = 08:00 America/New_York during EST,
    # 09:00 during EDT. Pick one and live with the DST shift,
    # or add a second cron for the other half of the year.
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Override target keyword (optional)'
        required: false

permissions:
  contents: write

concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Vendor the SKILL.md files so the script can inline them as system
      # prompts. We don't run Claude Code anymore — too much startup token
      # overhead for our rate limit. The skills' instructions are what we
      # actually need; they're just markdown.
      - name: Vendor skill packs
        run: |
          set -euo pipefail
          mkdir -p .skills
          git clone --depth=1 https://github.com/AgriciDaniel/claude-seo  .skills/claude-seo
          git clone --depth=1 https://github.com/AgriciDaniel/claude-blog .skills/claude-blog
          # Sanity check that the SKILL.md files we read at runtime exist.
          for f in \
            .skills/claude-seo/skills/seo/SKILL.md \
            .skills/claude-seo/skills/seo-audit/SKILL.md \
            .skills/claude-blog/skills/blog/SKILL.md \
            .skills/claude-blog/skills/blog-write/SKILL.md \
            .skills/claude-blog/skills/blog-audit/SKILL.md ; do
            [[ -f "$f" ]] && echo "found $f" || echo "missing $f (will be skipped)"
          done

      - name: Generate post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_VOICE_ID: ${{ secrets.XAI_VOICE_ID }}
          KEYWORD_OVERRIDE: ${{ inputs.keyword }}
        run: node scripts/daily-seo-job.mjs

      - name: Smoke build
        run: npm run build

      - name: Commit & push
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes — pipeline produced nothing. Failing so it's visible."
            exit 1
          fi
          git config user.name  "agentic-jimmy[bot]"
          git config user.email "agentic-jimmy[bot]@users.noreply.github.com"
          git add src/content/blog public/audio public/images
          SLUG=$(git diff --cached --name-only -- src/content/blog | head -1 | xargs -I{} basename {} .md)
          git commit -m "Publish: ${SLUG}"
          git push origin HEAD:main
