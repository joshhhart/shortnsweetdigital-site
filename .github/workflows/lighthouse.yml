name: Lighthouse CI

on:
  schedule:
    - cron: '17 7 * * *'  # daily, just before the 8am content publish
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://shortnsweetdigital.com/
            https://shortnsweetdigital.com/blog/
            https://shortnsweetdigital.com/about/
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.lighthouserc.json
